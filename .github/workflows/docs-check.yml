name: docs-check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-check:
    name: Docs, data, and locale checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check generated contracts
        run: python tools/sync_contracts.py --check

      - name: Validate data and locale
        run: python tools/validate_data.py

      - name: Run DataLoader schema regression tests
        run: python tools/test_data_loader_schema.py

      - name: Run GDScript project lint
        run: python tools/lint_gdscript_rules.py

      - name: Run project rules lint
        run: python tools/lint_project_rules.py

      - name: Run project rules lint regression tests
        run: python tools/test_project_rules_lint.py

      - name: Run semantic advisory lint
        run: python tools/lint_semantic_rules.py || true

      - name: Run semantic advisory lint regression tests
        run: python tools/test_semantic_rules_lint.py

      - name: Run docs health check
        run: python tools/docs_health_check.py

      - name: Check whitespace in committed diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          BASE="$BASE_SHA"
          if [ -z "$BASE" ] || [ "$BASE" = '0000000000000000000000000000000000000000' ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi
          git diff --check "$BASE" HEAD -- . ':(exclude)draft/**' ':(exclude)DRAFT/**'
