name: docs-check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-check:
    name: Docs, data, and locale checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path('docs/_kb_index.json'),
              Path('docs/AI记忆/current_state.json'),
          ]
          files.extend(sorted(Path('client/data').glob('*.json')))
          files.extend(sorted(Path('MinimumViableProduct/client/data').glob('*.json')))

          for path in files:
              with path.open(encoding='utf-8') as handle:
                  json.load(handle)
              print(f'json ok: {path}')
          PY

      - name: Validate locale CSV
        run: |
          python - <<'PY'
          import csv
          import re
          from pathlib import Path

          path = Path('client/locale/strings.csv')
          placeholder = re.compile(r'\{[a-z0-9_]+\}')

          with path.open(encoding='utf-8-sig', newline='') as handle:
              reader = csv.DictReader(handle)
              required = {'keys', 'zh_CN', 'en'}
              missing = required.difference(reader.fieldnames or [])
              if missing:
                  raise SystemExit(f'{path}: missing columns {sorted(missing)}')

              seen = set()
              for line_number, row in enumerate(reader, start=2):
                  key = row['keys']
                  if not key:
                      raise SystemExit(f'{path}:{line_number}: empty key')
                  if key in seen:
                      raise SystemExit(f'{path}:{line_number}: duplicate key {key}')
                  seen.add(key)

                  for locale in ('zh_CN', 'en'):
                      if not row[locale]:
                          raise SystemExit(f'{path}:{line_number}: missing {locale} translation for {key}')

                  zh_placeholders = set(placeholder.findall(row['zh_CN']))
                  en_placeholders = set(placeholder.findall(row['en']))
                  if zh_placeholders != en_placeholders:
                      raise SystemExit(
                          f'{path}:{line_number}: placeholder mismatch for {key}: '
                          f'zh_CN={sorted(zh_placeholders)} en={sorted(en_placeholders)}'
                      )

          print(f'csv ok: {path}')
          PY

      - name: Run docs health check
        run: python tools/docs_health_check.py

      - name: Check whitespace in committed diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          BASE="$BASE_SHA"
          if [ -z "$BASE" ] || [ "$BASE" = '0000000000000000000000000000000000000000' ]; then
            BASE="$(git rev-list --max-parents=0 HEAD)"
          fi
          git diff --check "$BASE" HEAD -- . ':(exclude)draft/**' ':(exclude)DRAFT/**'
